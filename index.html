<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristan's Daily</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-mark@4.0.0/dist/markdown-it-mark.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-ins@4.0.0/dist/markdown-it-ins.min.js"></script>
</head>
<body data-theme="light">
  <aside class="sidebar">
    <h1 class="logo">Tristan's Daily</h1>
    <nav class="nav">
      <button class="nav-btn active" data-view="compose" data-i18n="compose"></button>
      <button class="nav-btn" data-view="docs" data-i18n="docs"></button>
      <button class="nav-btn" data-view="featured" data-i18n="featured"></button>
      <button class="nav-btn" data-view="uploads" data-i18n="uploads"></button>
    </nav>
    <div class="tool-row"><button id="settingsBtn">⚙</button></div>
  </aside>

  <main class="main">
    <section id="compose" class="view active">
      <div class="form-row">
        <input id="titleInput" />
        <input id="dateInput" type="date" />
        <select id="typeInput"><option value="thought"></option><option value="work"></option></select>
        <label><input id="featuredInput" type="checkbox" /> <span data-i18n="featured"></span></label>
      </div>
      <div class="editor-grid"><textarea id="mdInput"></textarea><article id="preview" class="preview"></article></div>
      <div class="form-row"><button id="saveBtn" data-i18n="save"></button><span id="editHint" class="muted"></span></div>
      <p id="status" class="muted"></p>
    </section>

    <section id="docs" class="view">
      <div class="form-row"><label for="filterType" id="filterLabel"></label><select id="filterType"><option value="all"></option><option value="thought"></option><option value="work"></option></select></div>
      <div id="timeline"></div>
    </section>

    <section id="featured" class="view"><div id="featuredPanel"></div></section>

    <section id="uploads" class="view">
      <div class="form-row"><input id="uploadInput" type="file" accept=".md,.pdf,text/markdown,application/pdf" multiple /></div>
      <div class="form-row">
        <select id="uploadType"><option value="thought"></option><option value="work"></option></select>
        <label><input id="uploadFeatured" type="checkbox" /> <span data-i18n="setFeatured"></span></label>
      </div>
      <div id="uploadList"></div>
      <div id="filePreview" class="card"></div>
    </section>

    <section id="reader" class="view"><div class="form-row"><button id="backBtn" data-i18n="backDocs"></button></div><article id="readerContent" class="preview"></article></section>
  </main>

  <aside id="settingsPanel" class="settings-panel hidden">
    <h3 data-i18n="settings"></h3>
    <label data-i18n="language"></label><select id="langSelect"><option value="zh">中文</option><option value="en">English</option></select>
    <label data-i18n="theme"></label><select id="themeSelect"><option value="light">Light</option><option value="dark">Dark</option></select>
    <label data-i18n="fontZh"></label><select id="fontZhSelect"><option value="kaiti">楷体</option><option value="song">宋体</option><option value="hei">黑体</option></select>
    <label data-i18n="fontEn"></label><select id="fontEnSelect"><option value="times">Times New Roman</option><option value="georgia">Georgia</option></select>
    <label data-i18n="bgImage"></label><input id="bgUpload" type="file" accept="image/*" />
    <label data-i18n="previewOpacity"></label><input id="previewOpacity" type="range" min="0.45" max="0.95" step="0.05" />
    <button id="bgResetBtn" data-i18n="resetBg"></button>
  </aside>

  <script src="app.js"></script>
</body>
</html>
