<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristan's Daily</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body data-theme="light">
  <aside class="sidebar">
    <h1>Tristan's Daily</h1>
    <nav>
      <button class="nav-btn active" data-view="compose">撰写</button>
      <button class="nav-btn" data-view="categories">分类</button>
      <button class="nav-btn" data-view="featured">精选</button>
    </nav>
    <div class="controls">
      <button id="langToggle">EN</button>
      <button id="themeToggle">🌙</button>
    </div>
  </aside>

  <main class="main">
    <section id="compose" class="view active">
      <div class="row">
        <input id="entryTitle" placeholder="标题" />
        <input id="entryDate" type="date" />
        <select id="entryType">
          <option value="thought">随想</option>
          <option value="work">工作日志</option>
        </select>
        <label><input id="entryFeatured" type="checkbox" /> 精选</label>
      </div>
      <div class="editor-layout">
        <textarea id="markdownInput" placeholder="# 今天写点什么"></textarea>
        <article id="markdownPreview" class="preview"></article>
      </div>
      <div class="publish-panel">
        <details>
          <summary>GitHub 发布设置（方案B）</summary>
          <div class="grid-2">
            <input id="ghOwner" placeholder="owner，例如 Tristan" />
            <input id="ghRepo" placeholder="repo，例如 Tristan-s-Daily" />
            <input id="ghBranch" placeholder="branch，例如 work" value="work" />
            <input id="ghToken" type="password" placeholder="GitHub PAT（repo权限）" />
          </div>
        </details>
        <div class="row">
          <button id="saveDraftBtn">保存到站内数据</button>
          <button id="publishBtn">发布到 GitHub</button>
        </div>
        <p class="note" id="publishStatus">未发布</p>
      </div>
    </section>

    <section id="categories" class="view">
      <div class="row">
        <label for="filterType" id="filterLabel">类型筛选</label>
        <select id="filterType">
          <option value="all">全部</option>
          <option value="thought">随想</option>
          <option value="work">工作日志</option>
        </select>
      </div>
      <div id="timeline"></div>
    </section>

    <section id="featured" class="view">
      <div id="featuredList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
